<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1e90ff">
  <title>TradeMeter Offline</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --accent: #1e90ff;
      --border: rgba(148, 163, 184, 0.25);
      --shadow: 0 20px 50px rgba(15, 23, 42, 0.12);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --card: #111827;
        --text: #f8fafc;
        --muted: #94a3b8;
        --border: rgba(71, 85, 105, 0.55);
        --shadow: 0 20px 50px rgba(2, 6, 23, 0.45);
      }
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background:
        radial-gradient(circle at top, rgba(30, 144, 255, 0.18), transparent 40%),
        var(--bg);
      color: var(--text);
    }

    .offline-card {
      width: min(100%, 460px);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 28px;
      text-align: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 68px;
      height: 68px;
      border-radius: 20px;
      margin-bottom: 18px;
      background: linear-gradient(135deg, rgba(30, 144, 255, 0.18), rgba(32, 201, 151, 0.2));
      color: var(--accent);
      font-size: 32px;
      font-weight: 700;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 28px;
    }

    p {
      margin: 0 0 14px;
      color: var(--muted);
      line-height: 1.55;
    }

    .actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .btn {
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }
  </style>
</head>
<body>
  <main class="offline-card">
    <div class="badge">T</div>
    <h1>You're offline</h1>
    <p>TradeMeter can still open cached screens and assets, but live data needs an internet connection.</p>
    <p>Reconnect and refresh to continue syncing inventory, sales, and purchases.</p>
    <div class="actions">
      <button class="btn btn-primary" type="button" onclick="window.location.reload()">Try again</button>
      <a class="btn btn-secondary" href="/TradeMeter/index.php">Go home</a>
    </div>
  </main>
</body>
</html>
